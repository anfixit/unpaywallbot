# .github/workflows/deploy.yml
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Разрешения для push образа в GHCR
permissions:
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Матричные проверки качества (параллельно)
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check bot/

      - name: Ruff format check
        run: uv run ruff format --check bot/

  typecheck:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: mypy strict
        run: uv run mypy bot/ --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      BOT_TOKEN: "123456789:AABBCCDDEEFFaabbccddeeff-1234567890"
      ENCRYPTION_KEY: "test-encryption-key-32-chars!!"
      REDIS_URL: "redis://localhost:6379/0"
      ALLOWED_USERS: "[]"
      ENV: "testing"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        run: uv run pytest --tb=short -q

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install pip-audit
        run: uv pip install pip-audit --system

      - name: Audit dependencies for CVE
        run: uv run pip-audit

  # ──────────────────────────────────────────────
  # 2. Сборка и push Docker-образа в GHCR
  # ──────────────────────────────────────────────
  docker:
    name: Push Docker image
    needs: [lint, typecheck, test, security]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 3. Деплой на сервер
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🚀 Переходим в директорию проекта"
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📦 Получаем последние изменения"
            git pull origin main

            echo "🔧 Создаем .env.production"
            cat > .env.production << 'ENVEOF'
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            REDIS_URL=redis://localhost:6379/0
            ALLOWED_USERS=${{ secrets.ALLOWED_USERS }}
            LOG_LEVEL=INFO
            ENV=production
            ENVEOF

            chmod 600 .env.production

            echo "📦 Устанавливаем зависимости (без dev)"
            /home/deploy/.local/bin/uv sync --no-dev

            echo "🎭 Playwright уже установлен, пропускаем"

            echo "🔄 Перезапускаем сервис"
            sudo systemctl restart unpaywallbot

            echo "⏳ Ждем 5 секунд для полного запуска..."
            sleep 5

            echo "✅ Проверяем статус"
            STATUS=$(sudo systemctl is-active unpaywallbot)
            echo "Статус: $STATUS"

            if [ "$STATUS" != "active" ]; then
              echo "❌ Сервис не активен. Показываем логи:"
              sudo journalctl -u unpaywallbot -n 20 --no-pager
              exit 1
            fi

            echo "🎉 Деплой завершен успешно!"

  # ──────────────────────────────────────────────
  # 4. Уведомление в Telegram
  # ──────────────────────────────────────────────
  notify:
    name: Telegram notify
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          format: markdown
          message: |
            *🤖 UnpaywallBot CI/CD*

            📦 Коммит: `${{ github.sha }}`
            👤 Автор: ${{ github.actor }}
            📝 ${{ github.event.head_commit.message }}

            🔍 Lint: ${{ needs.deploy.result == 'success' && '✅' || '❌' }}
            🧪 Tests: ${{ needs.deploy.result == 'success' && '✅' || '❌' }}
            🐳 Docker: ${{ needs.deploy.result == 'success' && '✅' || '❌' }}
            🚀 Deploy: ${{ needs.deploy.result == 'success' && '✅' || '❌' }}

            [Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
