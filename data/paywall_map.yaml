# data/paywall_map.yaml
# Конфигурация paywall для целевых изданий.
#
# Ключ: домен (без www)
# type: soft | metered | hard | freemium
# platform: логика для группы изданий
# method: базовый метод обхода
# requires_auth: требуется ли авторизация
# requires_headless: требуется ли headless-браузер
# priority: 1 = реализовано, 2 = в разработке
#
# Типы paywall:
#   soft     — контент в DOM, скрыт JS-оверлеем
#   metered  — лимит бесплатных статей
#   freemium — часть статей бесплатна, часть за подпиской
#   hard     — контент не отдаётся без авторизации

# ============================================================
# ПРИОРИТЕТ 1 — Германия (Freemium)
# ============================================================
# Особенность: контент частично открыт, ключевые
# статьи имеют маркер (S+, Z+, F+, plus, reduced).
# Платформа german_freemium проверяет маркер в URL
# и выбирает стратегию.

spiegel.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "S+ статьи — маркер в URL"

zeit.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "Z+ маркер для премиум-контента"

faz.net:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "FAZ+ (F+) маркер"

sueddeutsche.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "?reduced=true в URL"

tagesspiegel.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "T+ маркер"

welt.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "WeltPlus — /plus/ в URL"

berliner-zeitung.de:
  type: freemium
  platform: german_freemium
  method: js_disable
  priority: 1
  note: "Freemium, аналогично другим DE"

